[theme]
# Rosso acceso per i pulsanti (es. "ACCEDI", "CLASSIFICHE", "Vai")
primaryColor = "#ff4b4b"

# Sfondo scuro profondo per l'intera app
backgroundColor = "#121212"

# Colore per sidebar e card (leggermente più chiaro dello sfondo)
secondaryBackgroundColor = "#1e1e1e"

# Testo principale bianco puro
textColor = "#ffffff"

# Font moderno senza grazie
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
# Stringa segreta per crittografare i cookie di sessione (2 ore di persistenza)
cookieSecret = "vX_8n2-M9k_RpL4z_Q1w-Tb6yF9_Gj5-Dc1s"

[browser]
# Nasconde il menu in alto a destra e le statistiche di utilizzo
gatherUsageStats = false
showToolbarCallback = false

[client]
showSidebarNavigation = false
